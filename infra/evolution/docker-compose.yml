version: "3.8"

# Evolution API — WhatsApp multi-instância
# Documentação: https://doc.evolution-api.com
#
# USO:
#   1. Copie este arquivo para o seu servidor
#   2. Crie um arquivo .env na mesma pasta (veja .env.example)
#   3. docker compose up -d
#   4. Acesse http://IP_DO_SERVIDOR:8080

services:
  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    environment:
      # ── Servidor ──────────────────────────────────────────────────────────
      SERVER_URL: ${EVOLUTION_SERVER_URL}        # ex: https://evo.seudominio.com
      CORS_ORIGIN: "*"
      CORS_METHODS: "POST,GET,PUT,DELETE"
      CORS_CREDENTIALS: "true"

      # ── Autenticação ───────────────────────────────────────────────────────
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}   # chave global — anote bem
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ── Webhook global (NXT Hub recebe eventos de todas as instâncias) ───
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${NXT_WEBHOOK_URL}    # ex: https://seuapp.com/api/webhooks/messaging/whatsapp_evolution
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"

      # ── Eventos que serão enviados ao NXT Hub ────────────────────────────
      WEBHOOK_EVENTS_APPLICATION_STARTUP: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_MESSAGES_SET: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"
      WEBHOOK_EVENTS_CONTACTS_SET: "false"
      WEBHOOK_EVENTS_CONTACTS_UPSERT: "false"
      WEBHOOK_EVENTS_CONTACTS_UPDATE: "false"
      WEBHOOK_EVENTS_PRESENCE_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_SET: "false"
      WEBHOOK_EVENTS_CHATS_UPSERT: "false"
      WEBHOOK_EVENTS_CHATS_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_DELETE: "false"
      WEBHOOK_EVENTS_GROUPS_UPSERT: "false"
      WEBHOOK_EVENTS_GROUPS_UPDATE: "false"
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_LABELS_EDIT: "false"
      WEBHOOK_EVENTS_LABELS_ASSOCIATION: "false"
      WEBHOOK_EVENTS_CALL: "false"
      WEBHOOK_EVENTS_TYPEBOT_START: "false"
      WEBHOOK_EVENTS_TYPEBOT_CHANGE_STATUS: "false"

      # ── Armazenamento ─────────────────────────────────────────────────────
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "false"
      STORE_CHATS: "false"

      # ── Configurações de sessão ───────────────────────────────────────────
      DEL_INSTANCE: "false"
      DEL_TEMP_INSTANCES: "true"

      # ── Log ───────────────────────────────────────────────────────────────
      LOG_LEVEL: ERROR
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  evolution_instances:
  evolution_store:
